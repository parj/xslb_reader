name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for bump keyword
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qE '^bump: (patch|minor|major|rc)'; then
            BUMP_TYPE=$(echo "$MSG" | grep -oE 'bump: (patch|minor|major|rc)' | awk '{print $2}')
            echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
            echo "triggered=true" >> "$GITHUB_OUTPUT"
          else
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit if no bump keyword
        if: steps.bump.outputs.triggered != 'true'
        run: echo "No bump keyword found — skipping release." && exit 0

      - uses: astral-sh/setup-uv@v5
        if: steps.bump.outputs.triggered == 'true'
        with:
          python-version: "3.11"

      - name: Compute next version
        if: steps.bump.outputs.triggered == 'true'
        id: version
        run: |
          CURRENT=$(grep '^version' pyproject.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(rc[0-9]+)?')
          BASE=$(echo $CURRENT | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          MAJOR=$(echo $BASE | cut -d. -f1)
          MINOR=$(echo $BASE | cut -d. -f2)
          PATCH=$(echo $BASE | cut -d. -f3)
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0; NEXT="$MAJOR.$MINOR.$PATCH" ;;
            minor) MINOR=$((MINOR+1)); PATCH=0; NEXT="$MAJOR.$MINOR.$PATCH" ;;
            patch) PATCH=$((PATCH+1)); NEXT="$MAJOR.$MINOR.$PATCH" ;;
            rc)
              RC_N=$(echo $CURRENT | grep -oE 'rc[0-9]+' | grep -oE '[0-9]+' || echo "0")
              NEXT_RC=$((RC_N+1))
              NEXT="$BASE""rc$NEXT_RC"
              ;;
          esac
          IS_PRERELEASE="false"
          if echo "$NEXT" | grep -qE 'rc[0-9]+'; then IS_PRERELEASE="true"; fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Update version in pyproject.toml and __init__.py
        if: steps.bump.outputs.triggered == 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml
          sed -i "s/^__version__ = \".*\"/__version__ = \"$NEXT\"/" xlsb_reader/__init__.py

      - name: Commit version bump and tag
        if: steps.bump.outputs.triggered == 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml xlsb_reader/__init__.py
          git commit -m "chore: release v$NEXT"
          git tag "v$NEXT"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.triggered == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v$NEXT" \
            --title "v$NEXT" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Build package
        if: steps.bump.outputs.triggered == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.bump.outputs.triggered == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
